<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrácia — Môj projekt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1 style="margin:0;font-size:1.25rem">Môj projekt</h1>
      <nav aria-label="Hlavná navigácia">
        <a href="index.html">Domov</a>
        <a href="login.html">Prihlásiť sa</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section style="margin-top:1rem">
      <h2>Vytvoriť účet</h2>
      <div class="form-card">
        <form id="regForm" action="#" method="post" onsubmit="handleRegister(event)">
          <label>Plné meno
            <input type="text" name="name" required>
          </label>
          <label>Email
            <input type="email" name="email" required>
          </label>
          <label>Heslo
            <input type="password" name="password" required>
          </label>
          <label>Potvrďte heslo
            <input type="password" name="password2" required>
          </label>
          <div style="margin-top:.75rem">
            <button type="submit">Registrovať</button>
          </div>
          <p class="muted small" style="margin-top:.5rem">Už máte účet? <a href="login.html">Prihlásiť sa</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <small>© 2026 Môj projekt</small>
  </footer>

  <script>
    function handleRegister(e){
      e.preventDefault();
      const f=new FormData(document.getElementById('regForm'));
      const p=f.get('password');
      const p2=f.get('password2');
      if(p!==p2){alert('Heslá sa nezhodujú.');return}
      alert('Demo registrácia: '+f.get('email'));
    }
  </script>
</body>
</html>
